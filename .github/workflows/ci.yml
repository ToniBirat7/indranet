name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: packages/backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  verify-backend:
    name: Verify Go Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: go build + vet
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/packages/backend:/app \
            -w /app \
            golang:1.22-alpine \
            sh -c "go build ./... && go vet ./... ./tests/..."

  test-backend:
    name: Integration Tests (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: indranet_test
          POSTGRES_USER: indranet
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Run Go integration tests
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/packages/backend:/app \
            -w /app \
            -e DATABASE_URL=postgres://indranet:testpassword@localhost:5432/indranet_test?sslmode=disable \
            -e REDIS_URL=redis://localhost:6379 \
            -e JWT_SECRET=test-secret-ci \
            golang:1.22 \
            go test -v -race -timeout 120s ./...

  build-poc-02:
    name: Build PoC 02 (WebRTC Signal)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build PoC 02 image
        uses: docker/build-push-action@v5
        with:
          context: poc/02-webrtc-stream
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-poc-04:
    name: Build PoC 04 (Payment Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build PoC 04 image
        uses: docker/build-push-action@v5
        with:
          context: poc/04-payment-gate
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  typecheck-ts:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Type-check shared + web
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            node:20-alpine \
            sh -c "corepack enable && \
                   pnpm install --frozen-lockfile && \
                   pnpm --filter @indranet/shared run type-check && \
                   pnpm --filter @indranet/web run type-check"

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/web/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8080
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_placeholder
