[package]
name = "indranet-client"
version = "0.1.0"
description = "IndraNet desktop client — host mode UX and session viewer"
authors = ["IndraNet Team"]
edition = "2021"

[lib]
name = "indranet_client_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "indranet-client"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2.0.0", features = [] }

[dependencies]
tauri = { version = "2.0.0", features = ["shell-open"] }
tauri-plugin-shell = "2.0.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
