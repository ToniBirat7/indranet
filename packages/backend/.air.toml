root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server"
  cmd = "go build -o ./tmp/server ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp", "testdata"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go"]
  kill_delay = "0s"
  stop_on_error = true

[log]
  time = true

[screen]
  clear_on_rebuild = true
