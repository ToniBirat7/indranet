version: '3.9'

networks:
  indranet-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  nats-data:
  minio-data:
  pgadmin-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: indranet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: indranet
      POSTGRES_USER: indranet
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indranet -d indranet"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - indranet-net

  redis:
    image: redis:7-alpine
    container_name: indranet-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - indranet-net

  nats:
    image: nats:latest
    container_name: indranet-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - indranet-net

  minio:
    image: minio/minio:latest
    container_name: indranet-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - indranet-net

  # Creates the default 'indranet' bucket in MinIO on startup
  minio-init:
    image: minio/mc:latest
    container_name: indranet-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/indranet;
      mc anonymous set download local/indranet/public;
      echo 'MinIO bucket created';
      "
    networks:
      - indranet-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: indranet-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@indranet.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - indranet-net
